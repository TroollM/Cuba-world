<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Control | Pagos-Mk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <nav>
        <div class="container nav-container">
            <div class="logo">Admin<span>Panel</span></div>
            <a href="index.html" class="btn-outline-sm" style="width: auto; padding: 5px 15px;">Salir</a>
        </div>
    </nav>

    <main class="container">
        <section class="section-box">
            <h3>Configuración Global</h3>
            <label>Comisión Retiro (CUP)</label>
            <input type="number" id="adm-com-fija" value="5">
            
            <label>Comisión Intercambio (%)</label>
            <input type="number" id="adm-com-p2p" value="1">
            
            <button class="btn-purple" onclick="guardarConfig()">Actualizar Reglas</button>
        </section>

        <section class="section-box">
            <h3>Retiros Pendientes</h3>
            <div id="lista-retiros">
                <p class="msg-system">No hay solicitudes de retiro ahora mismo.</p>
            </div>
        </section>

        <section class="section-box">
            <h3>Porcentajes de Bonificación</h3>
            <div class="admin-grid">
                <div>
                    <small>15 Días</small>
                    <input type="number" id="p-15" value="7">
                </div>
                <div>
                    <small>30 Días</small>
                    <input type="number" id="p-30" value="15">
                </div>
                <div>
                    <small>3 Meses</small>
                    <input type="number" id="p-90" value="25">
                </div>
            </div>
            <button class="btn-purple-sm" onclick="actualizarBonos()">Cambiar Porcentajes</button>
        </section>

        <section class="section-box">
            <h3>Usuarios Activos</h3>
            <table style="width: 100%; font-size: 0.8rem; text-align: left;">
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Saldo CUP</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-usuarios">
                    <tr>
                        <td>marlon_admin</td>
                        <td>1500.00</td>
                        <td><button style="color:red; background:none; border:none;">Ban</button></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script>
        function guardarConfig() {
            let fija = document.getElementById('adm-com-fija').value;
            let p2p = document.getElementById('adm-com-p2p').value;
            alert("Configuración guardada: Retiro " + fija + " CUP y P2P " + p2p + "%.");
        }

        function actualizarBonos() {
            alert("Porcentajes de bonificación actualizados para todos los usuarios.");
        }
    </script>

</body>
</html>
