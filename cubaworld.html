<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cuba World | Financial Future</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #1e1e2e;
            --glass: rgba(255, 255, 255, 0.85);
            --gradient: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background-color: #f8f9fd;
            background-image: radial-gradient(circle at top right, #efecff, transparent),
                              radial-gradient(circle at bottom left, #e0f7fa, transparent);
            color: var(--dark);
            min-height: 100vh;
        }

        /* --- CONTENEDOR DE PANTALLAS --- */
        .app-shell {
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .screen { display: none; padding: 20px; animation: slideUp 0.4s ease-out; }
        .screen.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- HEADER FUTURISTA --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 10px;
        }

        .logo {
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -1px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-tag {
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        /* --- TARJETA DE SALDO (MODERN CUBAPAY) --- */
        .main-balance {
            background: var(--gradient);
            padding: 35px 25px;
            border-radius: 35px;
            color: white;
            box-shadow: 0 20px 35px rgba(108, 92, 231, 0.25);
            position: relative;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .main-balance::before {
            content: ''; position: absolute; top: -50px; right: -50px;
            width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%;
        }

        .balance-label { font-size: 14px; opacity: 0.8; font-weight: 400; }
        .balance-val { font-size: 48px; font-weight: 800; margin: 10px 0; letter-spacing: -2px; }
        .balance-sub { font-size: 13px; background: rgba(255,255,255,0.2); padding: 6px 15px; border-radius: 30px; display: inline-block; }

        /* --- GRID DE MONEDAS --- */
        .coin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .coin-item {
            background: var(--glass);
            padding: 20px;
            border-radius: 28px;
            border: 1px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            text-align: left;
        }

        .coin-name { font-size: 11px; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
        .coin-val { font-size: 22px; font-weight: 700; color: var(--primary); margin-top: 5px; }

        /* --- SECCIÓN DE INVERSIÓN --- */
        .section-box {
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.02);
        }

        .section-box h3 { font-size: 17px; margin-bottom: 15px; color: var(--dark); }

        .plan-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f1f3ff;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .plan-info b { font-size: 14px; }
        .plan-info span { font-size: 12px; color: var(--primary); font-weight: 600; display: block; }

        .btn-action {
            background: var(--primary);
            color: white; border: none;
            padding: 10px 20px; border-radius: 15px;
            font-weight: 600; font-size: 12px;
        }

        /* --- MENÚ INFERIOR (APPLE STYLE) --- */
        .tab-bar {
            position: fixed; bottom: 25px; left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(30, 30, 46, 0.9);
            backdrop-filter: blur(15px);
            padding: 18px;
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 999;
        }

        .tab-item { font-size: 22px; text-decoration: none; color: #636e72; opacity: 0.5; }
        .tab-item.active { color: white; opacity: 1; transform: translateY(-3px); }

        /* --- ESTILOS REGISTRO --- */
        .auth-card {
            background: white; padding: 30px; border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        .form-input {
            width: 100%; padding: 16px; border-radius: 18px;
            border: 2px solid #f1f3ff; background: #f8f9fd;
            margin-bottom: 15px; outline: none; font-size: 14px;
        }

        .form-input:focus { border-color: var(--primary); background: white; }

        .btn-submit {
            width: 100%; padding: 18px; border-radius: 20px;
            background: var(--gradient); color: white; border: none;
            font-weight: 700; font-size: 16px; box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
        }
    </style>
</head>
<body>

<div class="app-shell">

    <div id="screen-reg" class="screen active">
        <div class="header" style="justify-content: center;">
            <div class="logo">CUBA WORLD</div>
        </div>
        
        <div class="auth-card">
            <h2 style="text-align: center; font-size: 22px;">Bienvenido</h2>
            <p style="text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 25px;">Usa datos reales para evitar problemas con el KYC.</p>
            
            <form id="regForm">
                <input type="text" id="regUser" class="form-input" placeholder="Nombre de Usuario" required>
                <input type="text" id="regReal" class="form-input" placeholder="Nombre Real" required>
                <input type="text" id="regPhone" class="form-input" placeholder="Número (+53)" required>
                <input type="password" id="regPass" class="form-input" placeholder="Contraseña segura" required>
                <button type="submit" class="btn-submit">Crear Cuenta</button>
            </form>
        </div>
    </div>

    <div id="screen-dash" class="screen">
        <div class="header">
            <div class="logo">CUBA WORLD</div>
            <div class="user-tag" id="userTag">@usuario</div>
        </div>

        <div class="main-balance">
            <div class="balance-label">Balance Principal</div>
            <div class="balance-val"><span id="valKIM">25.00</span> <small style="font-size: 18px;">KIM</small></div>
            <div class="balance-sub">≈ <span id="valCUP">25.00</span> Pesos CUP</div>
        </div>

        <div class="coin-grid">
            <div class="coin-item">
                <div class="coin-name">Saldo MK</div>
                <div class="coin-val" id="valMK">0.00</div>
            </div>
            <div class="coin-item">
                <div class="coin-name">Saldo MBM</div>
                <div class="coin-val" id="valMBM">0.00</div>
            </div>
        </div>

        <div class="section-box">
            <h3>Bonificaciones</h3>
            <div class="plan-card">
                <div class="plan-info"><b>Plan Quincenal</b><span>Bonos de hasta 7%</span></div>
                <button class="btn-action">Congelar</button>
            </div>
            <div class="plan-card">
                <div class="plan-info"><b>Plan Mensual</b><span>Bonos de hasta 15%</span></div>
                <button class="btn-action">Congelar</button>
            </div>
        </div>

        <nav class="tab-bar">
            <a href="#" class="tab-item active">🏠</a>
            <a href="#" class="tab-item">🤝</a>
            <a href="#" class="tab-item">💸</a>
            <a href="#" class="tab-item">⚙️</a>
        </nav>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

<script>
    // PEGA TUS DATOS DE FIREBASE AQUÍ
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROYECTO.firebaseapp.com",
        projectId: "TU_PROYECTO",
        storageBucket: "TU_PROYECTO.appspot.com",
        messagingSenderId: "ID_SENDER",
        appId: "TU_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Cambiar pantallas
    function goTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Registro
    document.getElementById('regForm').onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById('regUser').value + "@cubaworld.com";
        const pass = document.getElementById('regPass').value;

        auth.createUserWithEmailAndPassword(email, pass).then(res => {
            return db.collection("users").doc(res.user.uid).set({
                username: document.getElementById('regUser').value,
                realName: document.getElementById('regReal').value,
                phone: document.getElementById('regPhone').value,
                balanceKIM: 25.0,
                balanceMK: 0,
                balanceMBM: 0,
                kyc: false
            });
        }).then(() => {
            goTo('screen-dash');
        }).catch(err => alert(err.message));
    };

    // Escuchar cambios
    auth.onAuthStateChanged(user => {
        if(user) {
            db.collection("users").doc(user.uid).onSnapshot(doc => {
                const d = doc.data();
                document.getElementById('userTag').innerText = "@" + d.username;
                document.getElementById('valKIM').innerText = d.balanceKIM.toFixed(2);
                document.getElementById('valCUP').innerText = d.balanceKIM.toFixed(2);
                document.getElementById('valMK').innerText = d.balanceMK.toFixed(2);
                document.getElementById('valMBM').innerText = d.balanceMBM.toFixed(2);
                goTo('screen-dash');
            });
        }
    });
</script>
</body>
</html>
